{% extends 'layout.html' %}
{% block title %}Novo Usuário{% endblock %}

{% block content %}

<div class="mb-1">
  <h2 class="page-title mb-0">Cadastrar Usuário</h2>
  <div class="section-divider"></div>
</div>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card p-4 p-md-5 animate-fade">
      <div class="card-header-custom">
        <h5 class="card-title-custom">
          <i class="bi bi-person-plus me-2" style="color:var(--clr-primary);"></i>
          Dados do Novo Usuário
        </h5>
      </div>

      <form method="POST" action="{{ url_for('auth.register_user') }}" novalidate>
        <div class="row g-3">

          <div class="col-md-7">
            <label for="nome" class="form-label">Nome Completo</label>
            <input type="text" class="form-control" id="nome" name="nome" placeholder="Nome completo" required>
          </div>
          <div class="col-md-5">
            <label for="cpf" class="form-label">CPF</label>
            <input type="text" class="form-control" id="cpf" name="cpf" placeholder="000.000.000-00" required>
          </div>

          <div class="col-12">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="email@exemplo.com" required>
          </div>

          <div class="col-md-6">
            <label for="dataNascimento" class="form-label">Data de Nascimento</label>
            <input type="date" class="form-control" id="dataNascimento" name="dataNascimento" required>
          </div>
          <div class="col-md-6">
            <label for="telefone" class="form-label">Telefone</label>
            <input type="text" class="form-control" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX">
          </div>

          <div class="col-12">
            <label for="endereco" class="form-label">Endereço</label>
            <input type="text" class="form-control" id="endereco" name="endereco" placeholder="Rua, número, bairro, cidade">
          </div>

          <div class="col-md-6">
            <label for="tipoUsuario" class="form-label">Perfil</label>
            <select class="form-select" id="tipoUsuario" name="tipoUsuario" required>
              <option value="" disabled selected>Selecione um perfil</option>
              <option value="Leitor">Leitor</option>
              <option value="Bibliotecário">Bibliotecário</option>
              <option value="Administrador">Administrador</option>
            </select>
          </div>
          <div class="col-md-6">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required>
          </div>

        </div><!-- /row g-3 -->

        <div class="d-flex justify-content-end gap-2 mt-4 pt-2 border-top" style="border-color:var(--clr-border)!important;">
          <a href="{{ url_for('auth.list_users') }}" class="btn btn-secondary">
            <i class="bi bi-x-circle"></i>Cancelar
          </a>
          <button type="submit" class="btn btn-success">
            <i class="bi bi-plus-circle"></i>Cadastrar Usuário
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
